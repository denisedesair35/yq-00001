<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区共享工具借还管理系统</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="container">
      <h1 class="logo">🛠️ 社区共享工具管理</h1>
      <div class="user-panel">
        <span id="currentUser" class="user-info">未登录</span>
        <button class="btn btn-sm" onclick="showLogin()">切换用户</button>
      </div>
    </div>
  </header>

  <nav class="nav">
    <div class="container">
      <div class="tabs">
        <button class="tab active" data-tab="tools" onclick="switchTab('tools')">🔧 工具大厅</button>
        <button class="tab" data-tab="register" onclick="switchTab('register')">📝 登记工具</button>
        <button class="tab" data-tab="borrows" onclick="switchTab('borrows')">📋 借还管理</button>
        <button class="tab" data-tab="logs" onclick="switchTab('logs')">📝 操作记录</button>
        <button class="tab" data-tab="dashboard" onclick="switchTab('dashboard')">📊 数据概览</button>
      </div>
    </div>
  </nav>

  <main class="container main">
    <section id="tab-tools" class="tab-content active">
      <div class="panel">
        <div class="filters">
          <input type="text" id="searchKeyword" placeholder="搜索工具名称/位置..." oninput="loadTools()">
          <select id="filterCategory" onchange="loadTools()">
            <option value="">全部分类</option>
          </select>
          <select id="filterStatus" onchange="loadTools()">
            <option value="">全部状态</option>
            <option value="available">可用</option>
            <option value="repairing">维修中</option>
            <option value="offline">已下架</option>
          </select>
          <button class="btn btn-primary" onclick="switchTab('register')">+ 登记新工具</button>
        </div>
        <div id="toolsList" class="tools-grid"></div>
      </div>
    </section>

    <section id="tab-register" class="tab-content">
      <div class="panel">
        <h2>📝 登记共享工具</h2>
        <form id="toolForm" class="form" onsubmit="submitTool(event)">
          <div class="form-row">
            <div class="form-group">
              <label>工具名称 *</label>
              <input type="text" id="toolName" required placeholder="如：博世家用电钻">
            </div>
            <div class="form-group">
              <label>分类 *</label>
              <select id="toolCategory" required></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>最多可借天数 *</label>
              <input type="number" id="toolMaxDays" min="1" max="90" required placeholder="如：7">
            </div>
            <div class="form-group">
              <label>押金（元） *</label>
              <input type="number" id="toolDeposit" min="0" step="0.01" required placeholder="如：50">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>存放位置 *</label>
              <input type="text" id="toolLocation" required placeholder="如：3号楼2单元物业室">
            </div>
            <div class="form-group">
              <label>登记人</label>
              <input type="text" id="toolOwner" readonly>
            </div>
          </div>
          <div class="form-group">
            <label>工具描述</label>
            <textarea id="toolDesc" rows="3" placeholder="描述工具状况、配件、使用注意事项等..."></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交登记</button>
            <button type="reset" class="btn">重置</button>
          </div>
        </form>
      </div>
    </section>

    <section id="tab-borrows" class="tab-content">
      <div class="panel">
        <h2>📋 借还记录管理</h2>
        <div class="filters">
          <select id="borrowFilter" onchange="loadBorrows()">
            <option value="">全部记录</option>
            <option value="pending">⏳ 待审核</option>
            <option value="approved">✅ 借出中</option>
            <option value="overdue">⚠️ 已逾期</option>
            <option value="returned">📦 已归还</option>
            <option value="rejected">❌ 已拒绝</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="onlyMyBorrows" onchange="loadBorrows()"> 仅看我的申请
          </label>
          <button class="btn btn-danger" id="overdueBtn" onclick="showOverdueList()">查看逾期清单</button>
        </div>
        <div id="borrowsList" class="records-list"></div>
      </div>
    </section>

    <section id="tab-logs" class="tab-content">
      <div class="panel">
        <h2>📝 操作记录</h2>
        <div class="filters">
          <select id="logFilterType" onchange="loadOperationLogs()">
            <option value="">全部操作类型</option>
          </select>
          <select id="logFilterUser" onchange="loadOperationLogs()">
            <option value="">全部用户</option>
          </select>
          <input type="text" id="logFilterKeyword" placeholder="搜索用户名/详情..." oninput="loadOperationLogs()">
          <button class="btn" onclick="document.getElementById('logFilterType').value='';document.getElementById('logFilterUser').value='';document.getElementById('logFilterKeyword').value='';loadOperationLogs();">重置筛选</button>
        </div>
        <div id="logsList" class="logs-list"></div>
      </div>
    </section>

    <section id="tab-dashboard" class="tab-content">
      <div class="panel">
        <h2>📊 系统数据概览</h2>
        <div id="dashboardCards" class="dashboard-grid"></div>
      </div>
    </section>
  </main>
</div>

<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>👤 登录 / 注册</h3>
    <p class="modal-tip">输入用户名登录，新用户将自动注册为居民。<br>管理员用户名：<b>管理员</b></p>
    <div class="form-group">
      <label>用户名 *</label>
      <input type="text" id="loginName" placeholder="请输入姓名">
    </div>
    <div class="form-group">
      <label>联系电话</label>
      <input type="text" id="loginPhone" placeholder="选填">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
      <button class="btn" onclick="closeModal('loginModal')">取消</button>
    </div>
  </div>
</div>

<div id="borrowModal" class="modal">
  <div class="modal-content">
    <h3>📌 发起借用申请</h3>
    <div id="borrowToolInfo" class="tool-info-box"></div>
    <div class="form-group">
      <label>借用人姓名</label>
      <input type="text" id="borrowerName" readonly>
    </div>
    <div class="form-group">
      <label>联系电话</label>
      <input type="text" id="borrowerPhone" placeholder="请填写便于联系">
    </div>
    <div class="form-group">
      <label>借用说明</label>
      <textarea id="borrowReason" rows="3" placeholder="说明用途..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitBorrow()">提交申请</button>
      <button class="btn" onclick="closeModal('borrowModal')">取消</button>
    </div>
  </div>
</div>

<div id="approveModal" class="modal">
  <div class="modal-content">
    <h3>✅ 审核借用申请</h3>
    <div id="approveInfo" class="tool-info-box"></div>
    <div class="form-group">
      <label>实际出借天数</label>
      <input type="number" id="approveDays" min="1" max="90">
      <p class="tip-text">留空则使用工具默认可借天数</p>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="doApprove()">同意出借</button>
      <button class="btn btn-danger" onclick="showRejectInput()">拒绝申请</button>
      <button class="btn" onclick="closeModal('approveModal')">取消</button>
    </div>
    <div id="rejectArea" class="hidden">
      <div class="form-group">
        <label>拒绝原因</label>
        <textarea id="rejectReason" rows="2" placeholder="请说明拒绝原因..."></textarea>
      </div>
      <button class="btn btn-danger" onclick="doReject()">确认拒绝</button>
    </div>
  </div>
</div>

<div id="overdueModal" class="modal">
  <div class="modal-content wide">
    <h3>⚠️ 逾期清单</h3>
    <div id="overdueList" class="records-list"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('overdueModal')">关闭</button>
    </div>
  </div>
</div>

<div id="statusModal" class="modal">
  <div class="modal-content">
    <h3>⚙️ 修改工具状态</h3>
    <div id="statusToolInfo" class="tool-info-box"></div>
    <div class="form-group">
      <label>新状态</label>
      <select id="newToolStatus">
        <option value="available">可用</option>
        <option value="repairing">维修中</option>
        <option value="offline">已下架</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="doChangeStatus()">确认修改</button>
      <button class="btn" onclick="closeModal('statusModal')">取消</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
